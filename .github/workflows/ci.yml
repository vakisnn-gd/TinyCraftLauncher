name: Launcher CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: launcher-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Build and run launcher tests
        shell: cmd
        run: build-launcher.bat

      - name: Upload Windows launcher
        uses: actions/upload-artifact@v4
        with:
          name: TinyCraftLauncher-windows
          path: release/TinyCraftLauncher-windows.zip
          if-no-files-found: error
          retention-days: 14
